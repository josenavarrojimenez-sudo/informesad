<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Actualizar Expediente — Ciudad del Valle</title>
<link href="https://fonts.googleapis.com/css2?family=Tiempos+Fine:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
  :root{
    --bg:#FAF9F7;--card:#FFFFFF;--ink:#1A1A1A;--muted:#6B6560;--line:#E5E2DC;--accent:#D97706;--ok:#059669;--warn:#D97706;--danger:#DC2626;--radius:12px;
    --claude-grad: linear-gradient(135deg, #2D2014 0%, #3D2E1F 50%, #4A3728 100%);
  }
  body{font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);margin:0;}
  .header{background:var(--claude-grad);padding:18px 16px;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.15)}
  .header-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{color:#F5E6D3;font-weight:700;letter-spacing:-0.2px;font-family:'Tiempos Fine', serif}
  .brand small{display:block;color:#BFA88E;font-weight:500;letter-spacing:0}
  .wrap{max-width:960px;margin:16px auto 24px;padding:0 16px}
  h1{font-size:18px;margin:8px 0 16px;font-family:'Tiempos Fine', serif;color:#3D2E1F}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 4px 12px rgba(0,0,0,.06);padding:16px}
  .row{display:flex;gap:12px;align-items:center;margin:8px 0;flex-wrap:wrap}
  .row input[type=text], .row select{flex:1;min-width:180px;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:14px}
  .docs{margin-top:12px}
  .doc{display:flex;align-items:center;gap:10px;padding:12px 14px;flex-wrap:wrap;border-radius:10px;margin-bottom:4px;border:1px solid transparent;transition:background .15s}
  .doc:nth-child(odd){background:#FAF8F5;border-color:#EDE9E3}
  .doc:nth-child(even){background:#FFFFFF;border-color:#EDE9E3}
  .doc:hover{background:#F3EFE8;border-color:#D4C9B8}
  .doc.dragover{outline:2px dashed var(--accent);outline-offset:2px;background:#FFFBEB}
  .doc .name{flex:1;min-width:200px;font-weight:600;color:#2D1F0F}
  .status{display:flex;gap:8px;align-items:center}
  select{padding:10px;border:1px solid var(--line);border-radius:10px}
  input[type=file]{font-size:13px}
  .file-chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 8px;font-size:12px;border:1px solid var(--line)}
  .file-chip .clip{font-size:12px}
  .chip-pend{background:#F5F4F0;color:#6B6560;border-color:#E5E2DC}
  .chip-prog{background:#FEF3C7;color:#92400E;border-color:#F3E8C7}
  .chip-done{background:#ECFDF5;color:#065F46;border-color:#D1FAE5}
  .bar{height:12px;background:#EEE;border-radius:999px;overflow:hidden;border:1px solid var(--line)}
  .bar > div{height:100%;background:linear-gradient(90deg,#34d399,#10b981);width:0}
  .footer{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  button{padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;cursor:pointer}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .muted{color:var(--muted);font-size:12px}
  @media (max-width:680px){
    .row{flex-direction:column;align-items:stretch}
    .row > *{width:100%}
    .doc{flex-direction:column;align-items:stretch}
    .doc .name{min-width:unset}
    button, .row input[type=text], .row select{font-size:16px}
  }
</style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <div class="brand">Actualizar Expediente</div>
      <a href="./" style="color:#F5E6D3;text-decoration:none;font-weight:600">← Volver al Informe</a>
    </div>
  </div>
  <div class="wrap">
    <div class="card">
      <div class="row">
        <label for="expSelect" style="min-width:130px">Lote / Expediente</label>
        <div style="position:relative;display:inline-block;min-width:220px">
          <input id="expSelect" type="text" placeholder="Escribí el lote (ej: K.18)…" autocomplete="off"
            style="width:100%;padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-size:15px;box-sizing:border-box" />
          <div id="loteSuggestions" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ccc;border-top:none;border-radius:0 0 6px 6px;z-index:999;max-height:200px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.15)"></div>
        </div>
      </div>
      <div class="row">
        <div style="flex:1">
          <div class="bar"><div id="barFill"></div></div>
          <div class="muted" id="pct">0% completo</div>
        </div>
        <div class="footer">
          
          <select id="viewMode">
            <option value="todos">Vista: Todos</option>
            <option value="etapa">Vista: Por etapa</option>
          </select>
          <select id="stageSelect" style="display:none">
            <option value="">Todas las etapas</option>
          </select>
        </div>
      </div>
      <div class="summary" id="summary" style="position:sticky;top:64px;z-index:9;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px;box-shadow:var(--shadow-sm);margin-bottom:8px;display:none"></div>
      <div class="docs" id="docs"></div>
      <div class="row" style="margin-top:10px">
        <input id="newDoc" type="text" placeholder="Agregar nuevo requisito (ej. Carta de Aprobación)" />
        <button id="addDoc">Agregar requisito</button>
      </div>
    </div>
    <div class="muted" style="margin-top:10px">Nota: PRUEBA — no impacta el informe original. Los cambios se guardan localmente en tu navegador.</div>
  </div>
<script>
const SYNC_URL = 'https://script.google.com/macros/s/AKfycbwEvzDsez2XsaXPzxPQIXtJtcpq85zIWlVZqpaXp6NPSqukYuAc5d7NHkloBLX0FBvutw/exec';
const SYNC_TOKEN = 'Adelante2025';
const STAGES = ['Preanálisis','Contrato','Análisis','Banco','Firma','Obra/Entrega'];
const STATES = ['Pendiente','En Proceso','Completado'];
const LOTS_LIST = ["1-01 Barani","D.21","F.18","I.13","I.30","I.36","I.39","I.40","K.05","K.14","K.18","K.19","K.25","K.26","L.01","L.31","L.32","L.33","L.53","M.05","M.07","M.16","M.23"];

const DOCS = [
  {name:'Constancia Salarial / CPA', files:true, stage:'Preanálisis'},
  {name:'CREDID', files:true, stage:'Preanálisis'},
  {name:'SUGEF', files:true, stage:'Preanálisis'},
  {name:'Orden Patronal', files:true, optional:true, stage:'Preanálisis'},
  {name:'Sicere', files:true, optional:true, stage:'Preanálisis'},
  {name:'Cédula de Identidad', files:true, stage:'Preanálisis'},
  {name:'Colillas de Pago', files:true, stage:'Preanálisis'},
  {name:'Opción de Compra y Venta', files:true, stage:'Contrato'},
  {name:'Contrato Construcción', files:true, stage:'Contrato'},
  {name:'Hoja de Reserva Firmada', files:true, stage:'Contrato'},
  {name:'Croquis Reserva', files:true, stage:'Contrato'},
  {name:'Comprobante de Prima', files:true, optional:true, stage:'Contrato'},
  {name:'Estados de Cuenta', files:true, stage:'Análisis'},
  {name:'Estados de Tarjetas de Crédito', files:true, optional:true, stage:'Análisis'},
  {name:'Declaración de Renta (Hacienda)', files:true, optional:true, stage:'Análisis'},
  {name:'Morosidad Patronal CCSS', files:true, optional:true, stage:'Análisis'},
  {name:'Cartas de Descargo', files:true, optional:true, stage:'Análisis'},
  {name:'Certificación de Cancelación de Deudas', files:true, optional:true, stage:'Análisis'},
  {name:'Declaración Jurada de Deudas', files:true, stage:'Análisis'},
  {name:'Grupo de Interés Económico', files:true, optional:true, stage:'Análisis'},
  {name:'Solicitud de Crédito', files:true, stage:'Banco'},
  {name:'Estudio Registral', files:true, stage:'Banco'},
  {name:'Informe Avaluo', files:true, stage:'Banco'},
  {name:'Carta de Aprobacion', files:true, stage:'Banco'},
  {name:'Coordinacion Firma Cliente', files:false, stage:'Firma'},
  {name:'Permiso de Construcción', files:true, stage:'Obra/Entrega'},
  {name:'Plano Catastro', files:true, stage:'Obra/Entrega'},
  {name:'Hoja de Acabados', files:true, stage:'Obra/Entrega'},
  {name:'Presupuesto', files:true, stage:'Obra/Entrega'},
  {name:'Liquidación Anticipada', files:true, stage:'Obra/Entrega'},
  {name:'Orden Extra', files:true, optional:true, stage:'Obra/Entrega'},
  {name:'Croquis Extra', files:true, optional:true, stage:'Obra/Entrega'},
  {name:'Acta de Inicio', files:true, stage:'Obra/Entrega'}
];

// ─── State ───────────────────────────────────────────────────────────────
let currentId = '';

function storageKey(id){ return 'cdvExp_' + id; }

// ─── Persist & Sync ──────────────────────────────────────────────────────
function getStatuses(){
  const result = {};
  document.querySelectorAll('.doc-row').forEach(row => {
    const name = row.dataset.name;
    const sel = row.querySelector('select.status-sel');
    if(name && sel) result[name] = sel.value;
  });
  return result;
}

function saveLocal(){
  if(!currentId) return;
  const stored = getStored();
  stored.statuses = getStatuses();
  localStorage.setItem(storageKey(currentId), JSON.stringify(stored));
}

function getStored(){
  try { return JSON.parse(localStorage.getItem(storageKey(currentId)) || '{}'); } catch(e){ return {}; }
}

function saveToCloud(){
  if(!currentId) return;
  const statuses = getStatuses();
  const params = new URLSearchParams({
    token: SYNC_TOKEN,
    expedienteId: currentId,
    action: 'save',
    data: JSON.stringify({ statuses })
  });
  fetch(SYNC_URL + '?' + params.toString())
    .then(r => r.json())
    .then(res => { showToast(res.status === 'ok' ? '✅ Guardado en la nube' : '⚠️ Solo local'); })
    .catch(() => { showToast('⚠️ Sin conexión — guardado local'); });
}

function doSave(){
  saveLocal();
  saveToCloud();
}

function loadFromCloud(id){
  fetch(SYNC_URL + '?expedienteId=' + encodeURIComponent(id))
    .then(r => r.json())
    .then(res => {
      if(res.status === 'ok' && res.data && res.data.statuses){
        // Merge cloud into localStorage
        const stored = getStored();
        stored.statuses = res.data.statuses;
        localStorage.setItem(storageKey(id), JSON.stringify(stored));
        // Apply to DOM
        applyStatuses(res.data.statuses);
        updateProgress();
        showToast('☁️ Sincronizado');
      }
    })
    .catch(() => {});
}

function applyStatuses(statuses){
  document.querySelectorAll('.doc-row').forEach(row => {
    const name = row.dataset.name;
    if(statuses && statuses[name]){
      const sel = row.querySelector('select.status-sel');
      if(sel) sel.value = statuses[name];
    }
    updateRowChip(row);
  });
}

// ─── UI ──────────────────────────────────────────────────────────────────
function showToast(msg){
  let t = document.getElementById('toast');
  if(!t){
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:24px;right:16px;background:#1a1a1a;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .3s;z-index:9999;pointer-events:none';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

function updateProgress(){
  const rows = [...document.querySelectorAll('.doc-row')];
  let total = 0, done = 0;
  rows.forEach(row => {
    const sel = row.querySelector('select.status-sel');
    if(!sel) return;
    const isOptional = row.dataset.optional === 'true';
    const val = sel.value;
    // Optional: only count if status changed from Pendiente
    if(isOptional && val === 'Pendiente') return;
    total++;
    if(val === 'Completado') done++;
  });
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('pct').textContent = pct + '% completo (' + done + '/' + total + ')';
  document.getElementById('barFill').style.width = pct + '%';
}

function updateRowChip(row){
  const sel = row.querySelector('select.status-sel');
  const chip = row.querySelector('.status-chip');
  if(!sel || !chip) return;
  chip.textContent = sel.value;
  chip.className = 'status-chip file-chip ' + (sel.value === 'Completado' ? 'chip-done' : sel.value === 'En Proceso' ? 'chip-prog' : 'chip-pend');
}

function renderDocs(statuses){
  const cont = document.getElementById('docs');
  cont.innerHTML = '';
  const view = document.getElementById('viewMode').value;
  const stage = document.getElementById('stageSelect').value;

  let docs = DOCS.slice();
  if(view === 'etapa' && stage) docs = docs.filter(d => d.stage === stage);

  // Group by stage if etapa view
  if(view === 'etapa'){
    const grouped = {};
    docs.forEach(d => { if(!grouped[d.stage]) grouped[d.stage] = []; grouped[d.stage].push(d); });
    Object.entries(grouped).forEach(([stageName, stageDocs]) => {
      const h = document.createElement('div');
      h.style.cssText = 'font-weight:700;color:#fff;background:linear-gradient(90deg,#3D2E1F,#6B4C30);margin:16px 0 6px;font-size:12px;text-transform:uppercase;letter-spacing:1px;padding:6px 14px;border-radius:8px';
      h.textContent = stageName;
      cont.appendChild(h);
      stageDocs.forEach(doc => cont.appendChild(makeRow(doc, statuses)));
    });
  } else {
    docs.forEach(doc => cont.appendChild(makeRow(doc, statuses)));
  }
}

function renderFileList(container, docName, stored){
  // Remove existing file list items
  container.querySelectorAll('.file-item').forEach(el => el.remove());
  const files = (stored.files && stored.files[docName]) || [];
  files.forEach((f, idx) => {
    const item = document.createElement('div');
    item.className = 'file-item';
    item.style.cssText = 'display:flex;align-items:center;gap:6px;font-size:12px;background:#f5f5f5;border-radius:6px;padding:4px 8px;margin-top:2px;width:100%';

    const fname = document.createElement('span');
    fname.style.cssText = 'flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
    fname.textContent = f.name;
    item.appendChild(fname);

    // Download button
    const dl = document.createElement('a');
    dl.textContent = '⬇️';
    dl.title = 'Descargar';
    dl.style.cssText = 'cursor:pointer;text-decoration:none;font-size:14px';
    dl.href = f.data;
    dl.download = f.name;
    item.appendChild(dl);

    // Delete button
    const rm = document.createElement('button');
    rm.textContent = '✕';
    rm.title = 'Eliminar';
    rm.style.cssText = 'font-size:11px;padding:2px 6px;border:1px solid #ccc;border-radius:4px;cursor:pointer;background:#fff;color:#dc2626';
    rm.addEventListener('click', () => {
      const stored2 = getStored();
      if(stored2.files && stored2.files[docName]){
        stored2.files[docName].splice(idx, 1);
        localStorage.setItem(storageKey(currentId), JSON.stringify(stored2));
        const countEl = container.querySelector('.file-count');
        if(countEl) countEl.textContent = '📎 ' + stored2.files[docName].length + ' archivo(s)';
        renderFileList(container, docName, stored2);
      }
    });
    item.appendChild(rm);

    container.appendChild(item);
  });
}

function makeRow(doc, statuses){
  const row = document.createElement('div');
  row.className = 'doc doc-row';
  row.dataset.name = doc.name;
  row.dataset.optional = doc.optional ? 'true' : 'false';

  const name = document.createElement('div');
  name.className = 'name';
  name.textContent = doc.name + (doc.optional ? ' (opcional)' : '');
  row.appendChild(name);

  const sel = document.createElement('select');
  sel.className = 'status-sel';
  STATES.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o); });
  const savedVal = (statuses && statuses[doc.name]) || 'Pendiente';
  sel.value = savedVal;

  sel.addEventListener('change', () => {
    // Block "Completado" if files required but none attached
    if(sel.value === 'Completado' && doc.files){
      const stored2 = getStored();
      const attachedFiles = (stored2.files && stored2.files[doc.name]) || [];
      if(!attachedFiles.length){
        alert('Este requisito necesita al menos un archivo adjunto para marcarlo como Completado.');
        sel.value = 'En Proceso';
      }
    }
    updateRowChip(row);
    updateProgress();
    doSave();
  });
  row.appendChild(sel);

  const chip = document.createElement('span');
  chip.className = 'status-chip file-chip chip-pend';
  chip.textContent = savedVal;
  row.appendChild(chip);
  updateRowChip(row);

  // File attachment (if doc requires files)
  if(doc.files){
    const stored = getStored();
    const files = (stored.files && stored.files[doc.name]) || [];

    const fileWrap = document.createElement('div');
    fileWrap.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:4px;width:100%';

    const fileCount = document.createElement('span');
    fileCount.className = 'file-chip chip-pend';
    fileCount.style.cssText = 'font-size:11px;cursor:default';
    fileCount.className = 'file-chip chip-pend file-count';
    fileCount.textContent = files.length ? '📎 ' + files.length + ' archivo(s)' : '📎 Sin archivos';
    fileWrap.appendChild(fileCount);

    const upBtn = document.createElement('label');
    upBtn.textContent = '+ Adjuntar';
    upBtn.style.cssText = 'font-size:12px;padding:4px 10px;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:#f9f9f9';
    const upInp = document.createElement('input');
    upInp.type = 'file'; upInp.multiple = true; upInp.style.display = 'none';
    upBtn.appendChild(upInp);
    fileWrap.appendChild(upBtn);

    upInp.addEventListener('change', evt => {
      const newFiles = Array.from(evt.target.files || []);
      if(!newFiles.length) return;
      let pending = newFiles.length;
      newFiles.forEach(f => {
        const r = new FileReader();
        r.onload = () => {
          const stored2 = getStored();
          if(!stored2.files) stored2.files = {};
          if(!stored2.files[doc.name]) stored2.files[doc.name] = [];
          stored2.files[doc.name].push({name: f.name, type: f.type, size: f.size, data: r.result});
          localStorage.setItem(storageKey(currentId), JSON.stringify(stored2));
          pending--;
          if(pending === 0){
            const updated = (stored2.files[doc.name] || []).length;
            fileCount.textContent = '📎 ' + updated + ' archivo(s)';
            fileCount.className = 'file-chip chip-done';
            renderFileList(fileWrap, doc.name, stored2);
            showToast('✅ Archivo(s) adjuntado(s)');
          }
        };
        r.readAsDataURL(f);
      });
      evt.target.value = '';
    });

    // Render existing files
    renderFileList(fileWrap, doc.name, getStored());

    row.appendChild(fileWrap);
  }

  return row;
}

// ─── Load Expediente ─────────────────────────────────────────────────────
function loadExpediente(id){
  currentId = id;
  localStorage.setItem('cdvLastLote', id);

  const stored = getStored();
  const statuses = stored.statuses || {};

  renderDocs(statuses);
  updateProgress();

  // Then try cloud for fresher data
  loadFromCloud(id);
}

// ─── Autocomplete ─────────────────────────────────────────────────────────
function setupAutocomplete(){
  const inp = document.getElementById('expSelect');
  const box = document.getElementById('loteSuggestions');

  inp.addEventListener('input', () => {
    const v = inp.value.trim().toLowerCase();
    if(!v){ box.style.display = 'none'; return; }
    const matches = LOTS_LIST.filter(l => l.toLowerCase().includes(v));
    if(!matches.length){ box.style.display = 'none'; return; }
    box.innerHTML = '';
    matches.forEach(l => {
      const d = document.createElement('div');
      d.textContent = l;
      d.style.cssText = 'padding:10px 12px;cursor:pointer;font-size:14px;border-bottom:1px solid #eee';
      d.addEventListener('mousedown', e => e.preventDefault());
      d.addEventListener('click', () => selectLote(l));
      box.appendChild(d);
    });
    box.style.display = 'block';
  });

  inp.addEventListener('blur', () => {
    setTimeout(() => { box.style.display = 'none'; }, 200);
  });

  // Auto-clear when user manually edits the input after a lote was loaded
  let _clearing = false;
  inp.addEventListener('keydown', () => {
    if(currentId && !_clearing){
      _clearing = true;
      setTimeout(() => {
        if(inp.value.trim() !== currentId){
          document.getElementById('docs').innerHTML = '';
          document.getElementById('barFill').style.width = '0%';
          document.getElementById('pct').textContent = '0% completo';
          currentId = '';
        }
        _clearing = false;
      }, 50);
    }
  });

  inp.addEventListener('keydown', e => {
    if(e.key === 'Enter'){
      const v = inp.value.trim();
      if(LOTS_LIST.includes(v)) selectLote(v);
    }
  });
}

function selectLote(lote){
  document.getElementById('expSelect').value = lote;
  document.getElementById('loteSuggestions').style.display = 'none';
  loadExpediente(lote);
}

// ─── Init ─────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  setupAutocomplete();

  // Populate stages
  const stSel = document.getElementById('stageSelect');
  STAGES.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; stSel.appendChild(o); });

  document.getElementById('viewMode').addEventListener('change', () => {
    const vm = document.getElementById('viewMode').value;
    document.getElementById('stageSelect').style.display = vm === 'etapa' ? 'inline-block' : 'none';
    if(currentId) renderDocs(getStored().statuses || {});
  });

  document.getElementById('stageSelect').addEventListener('change', () => {
    if(currentId) renderDocs(getStored().statuses || {});
  });

  document.getElementById('addDoc').addEventListener('click', () => {
    const inp = document.getElementById('newDoc');
    const name = inp.value.trim();
    if(!name || !currentId) return;
    const stored = getStored();
    if(!stored.statuses) stored.statuses = {};
    stored.statuses[name] = 'Pendiente';
    localStorage.setItem(storageKey(currentId), JSON.stringify(stored));
    renderDocs(stored.statuses);
    updateProgress();
    inp.value = '';
  });

  // Restore last lote
  const last = localStorage.getItem('cdvLastLote');
  if(last){
    document.getElementById('expSelect').value = last;
    loadExpediente(last);
  }
});
</script>
</body>
</html>
