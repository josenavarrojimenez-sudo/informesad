<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Actualizar Expediente — Prueba</title>
<link href="https://fonts.googleapis.com/css2?family=Tiempos+Fine:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
  :root{
    --bg:#FAF9F7;--card:#FFFFFF;--ink:#1A1A1A;--muted:#6B6560;--line:#E5E2DC;--accent:#D97706;--ok:#059669;--warn:#D97706;--danger:#DC2626;--radius:12px;
    --claude-grad: linear-gradient(135deg, #2D2014 0%, #3D2E1F 50%, #4A3728 100%);
  }
  body{font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);margin:0;}
  .header{background:var(--claude-grad);padding:18px 16px;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.15)}
  .header-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{color:#F5E6D3;font-weight:700;letter-spacing:-0.2px;font-family:'Tiempos Fine', serif}
  .brand small{display:block;color:#BFA88E;font-weight:500;letter-spacing:0}
  .wrap{max-width:960px;margin:16px auto 24px;padding:0 16px}
  h1{font-size:18px;margin:8px 0 16px;font-family:'Tiempos Fine', serif;color:#3D2E1F}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 4px 12px rgba(0,0,0,.06);padding:16px}
  .row{display:flex;gap:12px;align-items:center;margin:8px 0;flex-wrap:wrap}
  .row input[type=text], .row select{flex:1;min-width:180px;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:14px}
  .docs{margin-top:12px}
  .doc{display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);padding:12px 0;flex-wrap:wrap}
  .doc.dragover{outline:2px dashed var(--accent);outline-offset:4px;background:#FFFBEB}
  .doc:last-child{border-bottom:none}
  .doc .name{flex:1;min-width:200px;font-weight:600}
  .status{display:flex;gap:8px;align-items:center}
  select{padding:10px;border:1px solid var(--line);border-radius:10px}
  input[type=file]{font-size:13px}
  .file-chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 8px;font-size:12px;border:1px solid var(--line)}
  .file-chip .clip{font-size:12px}
  .chip-pend{background:#F5F4F0;color:#6B6560;border-color:#E5E2DC}
  .chip-prog{background:#FEF3C7;color:#92400E;border-color:#F3E8C7}
  .chip-done{background:#ECFDF5;color:#065F46;border-color:#D1FAE5}
  .bar{height:12px;background:#EEE;border-radius:999px;overflow:hidden;border:1px solid var(--line)}
  .bar > div{height:100%;background:linear-gradient(90deg,#34d399,#10b981);width:0}
  .footer{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  button{padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;cursor:pointer}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .muted{color:var(--muted);font-size:12px}
  @media (max-width:680px){
    .row{flex-direction:column;align-items:stretch}
    .row > *{width:100%}
    .doc{flex-direction:column;align-items:stretch}
    .doc .name{min-width:unset}
    button, .row input[type=text], .row select{font-size:16px}
  }
</style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <div class="brand">Actualizar Expediente <small>Versión de prueba · estilo Claude</small></div>
      <a href="./" style="color:#F5E6D3;text-decoration:none;font-weight:600">← Volver al Informe</a>
    </div>
  </div>
  <div class="wrap">
    <div class="card">
      <div class="row">
        <label for="expSelect" style="min-width:130px">Lote / Expediente</label>
        <select id="expSelect"><option value="">Cargando lotes…</option></select>
        <input id="expediente" type="text" placeholder="O escribir manual (Ej: F.18)" />
        <button id="refreshLots">Refrescar lotes</button>
        <button id="load" class="primary">Cargar</button>
        <button id="clear">Limpiar</button>
      </div>
      <div class="row">
        <div style="flex:1">
          <div class="bar"><div id="barFill"></div></div>
          <div class="muted" id="pct">0% completo</div>
        </div>
        <div class="footer">
          <button id="save" class="primary">Guardar</button>
          <button id="refreshLots">Refrescar lotes</button>
        </div>
      </div>
      <div class="docs" id="docs"></div>
      <div class="row" style="margin-top:10px">
        <input id="newDoc" type="text" placeholder="Agregar nuevo requisito (ej. Carta de Aprobación)" />
        <button id="addDoc">Agregar requisito</button>
      </div>
    </div>
    <div class="muted" style="margin-top:10px">Nota: PRUEBA — no impacta el informe original. Los cambios se guardan localmente en tu navegador.</div>
  </div>
<script>
// Definición definitiva con adjuntos requeridos/opcionales
const DOCS = [
  {name:'Estados de Cuenta', files:true},
  {name:'Estudio Registral', files:true},
  {name:'Plano Catastro', files:true},
  {name:'Permiso de Construcción', files:true},
  {name:'Solicitud de Crédito', files:true},
  {name:'Acta de Inicio', files:true},
  {name:'Orden Extra', files:true, optional:true},
  {name:'Croquis Extra', files:true, optional:true},
  {name:'Resolución Judicial', files:true, optional:true},
  {name:'Certificación de Cancelación de Deudas', files:true, optional:true},
  {name:'Croquis Reserva', files:true},
  {name:'Hoja de Reserva Firmada', files:true},
  {name:'Liquidación Anticipada', files:true},
  {name:'Hoja de Acabados', files:true},
  {name:'Presupuesto', files:true},
  {name:'Comprobante de Prima', files:true, optional:true},
  {name:'Colillas de Pago', files:true},
  {name:'Declaración Jurada de Deudas', files:true},
  {name:'Grupo de Interés Económico', files:true, optional:true},
  {name:'Constancia Salarial / CPA', files:true},
  {name:'CREDID', files:true},
  {name:'SUGEF', files:true},
  {name:'Orden Patronal', files:true, optional:true},
  {name:'Sicere', files:true, optional:true},
  {name:'Cédula de Identidad', files:true},
  {name:'Opción de Compra y Venta', files:true},
  {name:'Contrato Construcción', files:true},
  {name:'Estados de Tarjetas de Crédito', files:true, optional:true},
  {name:'Declaración de Renta (Hacienda)', files:true, optional:true},
  {name:'Morosidad Patronal CCSS', files:true, optional:true},
  {name:'Cartas de Descargo', files:true, optional:true},
  {name:'Informe Avaluo', files:true},
  {name:'Carta de Aprobacion', files:true},
  {name:'Coordinacion Firma Cliente', files:false} // solo estado
];
const STATES = ['Pendiente','En Proceso','Completado'];
let currentId = '';

function key(id){return `expedienteProgress:v2:${id}`}
async function fetchLots(){
  try{
    const res = await fetch('./index.html',{cache:'no-store'});
    const html = await res.text();
    const rx = /<span class="lote-badge">([^<]+)<\/span>/g;
    const lots = new Set();
    let m; while((m=rx.exec(html))){ lots.add(m[1].trim()); }
    return Array.from(lots);
  }catch(e){ return []; }
}
async function populateLots(){
  const sel=document.getElementById('expSelect');
  sel.innerHTML = '<option value="">Seleccionar lote del informe…</option>';
  const lots = await fetchLots();
  if(!lots.length){ sel.innerHTML = '<option value="">(No se pudo leer lotes — usar entrada manual)</option>'; return; }
  lots.sort((a,b)=>a.localeCompare(b, 'es', {numeric:true}));
  lots.forEach(l=>{ const o=document.createElement('option'); o.value=l; o.textContent=l; sel.appendChild(o); });
}

function makeRow(doc, data){
  const row=document.createElement('div');row.className='doc';
  const label=document.createElement('div');label.className='name';label.textContent=doc.name;row.appendChild(label);

  const sel=document.createElement('select');
  STATES.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o)});
  sel.value = (data.statuses&&data.statuses[doc.name]) || 'Pendiente';
  sel.addEventListener('change', ()=>{
    if(sel.value==='Completado' && doc.files){
      const items=(data.files&&data.files[doc.name])||[];
      if(!items.length){ alert('Este requisito requiere al menos un archivo para marcarlo como Completado.'); sel.value='En Proceso'; }
    }
    updatePct();
    updateChip(row, doc, data);
  });
  row.appendChild(sel);

  // file chip indicator
  const chip=document.createElement('span'); chip.className='file-chip'; chip.style.display='none';
  const clip=document.createElement('span'); clip.className='clip'; clip.textContent='📎'; chip.appendChild(clip);
  const countSpan=document.createElement('span'); countSpan.className='count'; chip.appendChild(countSpan);
  row.appendChild(chip);

  if(doc.files){
    const up=document.createElement('input');
    up.type='file'; up.multiple=true; up.style.marginLeft='6px';
    const handleAdd=(files)=>{
      if(!files||!files.length) return;
      const list = data.files[doc.name] || (data.files[doc.name]=[]);
      files.forEach(f=>{
        const r=new FileReader();
        r.onload=()=>{ list.push({name:f.name,type:f.type||'',size:f.size||0,data:r.result}); renderFiles(row, doc, data); updatePct(); };
        r.readAsDataURL(f);
      });
    };
    up.addEventListener('change', evt=>{ handleAdd(Array.from(evt.target.files||[])); evt.target.value=''; });
    row.appendChild(up);

    // Drag & drop
    row.addEventListener('dragover', e=>{ e.preventDefault(); row.classList.add('dragover'); });
    row.addEventListener('dragleave', ()=> row.classList.remove('dragover'));
    row.addEventListener('drop', e=>{ e.preventDefault(); row.classList.remove('dragover'); handleAdd(Array.from(e.dataTransfer.files||[])); });

    const filesBox=document.createElement('div');
    filesBox.className='files';
    filesBox.style.flexBasis='100%';
    filesBox.style.marginLeft='0';
    filesBox.style.display='block';
    row.appendChild(filesBox);
    renderFiles(row, doc, data);
  }
  return row;
}

function formatBytes(n){ if(!n) return '0 B'; const u=['B','KB','MB','GB']; let i=0; while(n>=1024 && i<u.length-1){ n/=1024; i++; } return (Math.round(n*10)/10)+' '+u[i]; }

function updateChip(row, doc, data){
  const chip = row.querySelector('.file-chip');
  if(!chip) return;
  const items=(data.files&&data.files[doc.name])||[];
  const totalSize = items.reduce((s,it)=> s+(it.size||0), 0);
  const countSpan = chip.querySelector('.count');
  // color by status
  const status = row.querySelector('select')?.value || 'Pendiente';
  chip.classList.remove('chip-pend','chip-prog','chip-done');
  if(status==='Completado') chip.classList.add('chip-done');
  else if(status==='En Proceso') chip.classList.add('chip-prog');
  else chip.classList.add('chip-pend');

  if(items.length){
    chip.style.display='inline-flex';
    countSpan.textContent = `${items.length} archivos • ${formatBytes(totalSize)}`;
  } else {
    // mostrar chip vacio con color si hay estado? mejor ocultarlo cuando no hay adjuntos
    chip.style.display='none';
  }
}

function renderFiles(row, doc, data){
  const box=row.querySelector('.files');
  if(!box) return;
  const items=(data.files&&data.files[doc.name])||[];
  const totalSize = items.reduce((s,it)=> s+(it.size||0), 0);
  box.innerHTML = items.length? `Adjuntos (${items.length} • ${formatBytes(totalSize)}). Arrastrá y soltá más archivos aquí:` : 'Arrastrá y soltá archivos aquí o usá el botón Seleccionar.';
  box.style.fontSize='12px'; box.style.color='#6B6560'; box.style.marginTop='6px';
  const actions=document.createElement('div'); actions.style.marginTop='6px';
  if(items.length){
    const zipBtn=document.createElement('button'); zipBtn.textContent='Descargar ZIP de este requisito'; zipBtn.style.fontSize='12px'; zipBtn.onclick=async()=>{
      const zip=new JSZip();
      const decode=(dataUrl)=>{ const comma=dataUrl.indexOf(','); const bstr=atob(dataUrl.slice(comma+1)); const u8=new Uint8Array(bstr.length); for(let i=0;i<bstr.length;i++) u8[i]=bstr.charCodeAt(i); return u8; };
      items.forEach(fi=> zip.file(fi.name, decode(fi.data)) );
      const blob=await zip.generateAsync({type:'blob'});
      saveAs(blob, `${doc.name.replace(/[^\w\-\. ]+/g,'_')}.zip`);
    };
    actions.appendChild(zipBtn);
  }
  box.appendChild(actions);
  const list=document.createElement('div'); list.style.marginTop='6px';
  items.forEach((fi,idx)=>{
    const wrap=document.createElement('span'); wrap.style.display='inline-flex'; wrap.style.alignItems='center'; wrap.style.marginRight='10px'; wrap.style.marginBottom='6px';
    const a=document.createElement('a'); a.textContent=fi.name; a.style.marginRight='6px'; a.style.fontSize='12px'; a.href=fi.data; a.download=fi.name; wrap.appendChild(a);
    const rm=document.createElement('button'); rm.textContent='✕'; rm.title='Eliminar'; rm.style.fontSize='11px'; rm.style.padding='2px 6px'; rm.onclick=()=>{ items.splice(idx,1); renderFiles(row, doc, data); updatePct(); };
    wrap.appendChild(rm);
    list.appendChild(wrap);
  });
  box.appendChild(list);
  updateChip(row, doc, data);
}

function getCurrentData(){
  // collect from DOM
  const data={statuses:{}, files: load(currentId, /*silent*/true).files || {}};
  document.querySelectorAll('.doc').forEach(row=>{
    const name=row.querySelector('.name').textContent;
    const val=row.querySelector('select').value;
    data.statuses[name]=val;
  });
  return data;
}

function renderRows(data){
  const cont=document.getElementById('docs');
  cont.innerHTML='';
  if(!data.statuses) data.statuses={};
  if(!data.files) data.files={};
  DOCS.forEach(doc=>{
    if(!data.files[doc.name]) data.files[doc.name]=[];
    cont.appendChild(makeRow(doc, data));
  });
}

function migrateStatus(v, doc){
  // Map old statuses -> new 3-state model
  if(v==='Aprobado') return 'Completado';
  if(v==='Recibido' || v==='Observado') return 'En Proceso';
  if(v==='Pendiente') return 'Pendiente';
  if(v==='N/A') return doc && doc.optional ? 'Completado' : 'En Proceso'; // si era N/A y el doc es opcional, marcar completo; si no, dejar en proceso
  return 'Pendiente';
}

function load(id, silent){
  if(id) currentId = id;
  const raw = localStorage.getItem(key(currentId));
  let data = raw? JSON.parse(raw): {statuses:{},files:{}};
  // migrate statuses to new set
  const migrated={};
  DOCS.forEach(doc=>{
    const prev = data.statuses ? data.statuses[doc.name] : undefined;
    migrated[doc.name] = migrateStatus(prev, doc);
  });
  data.statuses = migrated;
  if(!silent){ renderRows(data); updatePct(); }
  return data;
}

function updatePct(){
  const selects=[...document.querySelectorAll('.doc select')];
  const total=selects.length;
  const done=selects.filter(s=>s.value==='Completado').length; // criterio: solo "Completado" cuenta
  const pct=Math.round((done/total)*100);
  document.getElementById('pct').textContent=`${pct}% completo (${done}/${total})`;
  document.getElementById('barFill').style.width=pct+'%';
}

function save(){
  if(!currentId){alert('Definí primero el ID de expediente');return}
  const prev = load(currentId, /*silent*/true);
  const data=getCurrentData();
  // keep files map from prev if missing
  data.files = data.files && Object.keys(data.files).length? data.files : (prev.files||{});
  localStorage.setItem(key(currentId), JSON.stringify(data));
  alert('Guardado localmente.');
}

function addDoc(){
  const inp=document.getElementById('newDoc');
  const name=inp.value.trim();
  if(!name) return;
  if(!DOCS.some(d=>d.name===name)) DOCS.push({name, files:false});
  const data=getCurrentData();
  renderRows(data);
  updatePct();
  inp.value='';
}

// wire
const exp=document.getElementById('expediente');
const sel=document.getElementById('expSelect');
document.getElementById('load').onclick=()=>{
  const v = sel.value || exp.value.trim();
  if(!v) return; load(v);
};
document.getElementById('clear').onclick=()=>{exp.value='';sel.value='';document.getElementById('docs').innerHTML='';document.getElementById('barFill').style.width='0%';document.getElementById('pct').textContent='0% completo'};
document.getElementById('save').onclick=save;
document.getElementById('addDoc').onclick=addDoc;
document.getElementById('refreshLots').onclick=populateLots;
sel.addEventListener('change',()=>{ if(sel.value) { exp.value=''; load(sel.value); } });

// init
populateLots();
</script>
</body>
</html>
