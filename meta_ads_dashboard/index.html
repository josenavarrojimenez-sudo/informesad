<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Ads Dashboard — Adelante Desarrollos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }
  header { background: linear-gradient(135deg, #1877f2, #0d47a1); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.4rem; font-weight: 700; color: white; }
  header span { font-size: 0.85rem; color: rgba(255,255,255,0.7); }
  #status-bar { background: #1a1d27; padding: 8px 32px; font-size: 0.8rem; color: #888; border-bottom: 1px solid #2a2d3a; }
  #status-bar span { color: #4caf50; font-weight: 600; }
  .container { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .kpi-card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 12px; padding: 20px; }
  .kpi-card .label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .kpi-card .value { font-size: 1.8rem; font-weight: 700; color: #fff; }
  .kpi-card .sub { font-size: 0.75rem; color: #666; margin-top: 4px; }
  .kpi-card.blue { border-top: 3px solid #1877f2; }
  .kpi-card.green { border-top: 3px solid #4caf50; }
  .kpi-card.orange { border-top: 3px solid #ff9800; }
  .kpi-card.purple { border-top: 3px solid #9c27b0; }
  .section { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
  .section h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: #ccc; display: flex; align-items: center; gap: 8px; }
  .filter-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn { background: #2a2d3a; border: 1px solid #3a3d4a; color: #ccc; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
  .filter-btn.active, .filter-btn:hover { background: #1877f2; border-color: #1877f2; color: white; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { text-align: left; padding: 10px 12px; color: #666; font-weight: 600; text-transform: uppercase; font-size: 0.72rem; letter-spacing: 0.5px; border-bottom: 1px solid #2a2d3a; }
  td { padding: 12px; border-bottom: 1px solid #1e2130; }
  tr:hover td { background: #1e2130; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
  .badge.active { background: rgba(76,175,80,0.15); color: #4caf50; border: 1px solid rgba(76,175,80,0.3); }
  .badge.paused { background: rgba(255,152,0,0.15); color: #ff9800; border: 1px solid rgba(255,152,0,0.3); }
  .progress-bar { background: #2a2d3a; border-radius: 4px; height: 6px; overflow: hidden; width: 120px; }
  .progress-fill { height: 100%; background: #1877f2; border-radius: 4px; }
  .objective-chip { background: #2a2d3a; color: #aaa; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; }
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  canvas { max-width: 100%; }
  #loading { display: flex; align-items: center; justify-content: center; height: 200px; color: #666; font-size: 1rem; }
  .spinner { width: 32px; height: 32px; border: 3px solid #2a2d3a; border-top-color: #1877f2; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #f44336; background: rgba(244,67,54,0.1); padding: 12px 16px; border-radius: 8px; border: 1px solid rgba(244,67,54,0.3); }
  .refresh-btn { background: #1877f2; color: white; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
  .refresh-btn:hover { background: #1565c0; }
  @media (max-width: 768px) { .chart-grid { grid-template-columns: 1fr; } .container { padding: 16px; } }
</style>
</head>
<body>

<header>
  <h1>📊 Meta Ads Dashboard — Adelante Desarrollos CDV</h1>
  <div style="display:flex;align-items:center;gap:12px;">
    <span id="last-update">Cargando...</span>
    <button class="refresh-btn" onclick="loadData()">↻ Actualizar</button>
  </div>
</header>
<div id="status-bar">Estado: <span id="conn-status">Conectando...</span></div>

<div class="container">

  <!-- KPIs -->
  <div class="kpi-grid" id="kpi-grid">
    <div style="height:88px;background:#1a1d27;border-radius:12px;animation:pulse 1.5s infinite;"></div>
    <div style="height:88px;background:#1a1d27;border-radius:12px;animation:pulse 1.5s infinite;"></div>
    <div style="height:88px;background:#1a1d27;border-radius:12px;animation:pulse 1.5s infinite;"></div>
    <div style="height:88px;background:#1a1d27;border-radius:12px;animation:pulse 1.5s infinite;"></div>
  </div>

  <!-- Charts -->
  <div class="chart-grid">
    <div class="section">
      <h2>📈 Gasto por campaña activa (últimos 30 días)</h2>
      <canvas id="spendChart" height="200"></canvas>
    </div>
    <div class="section">
      <h2>🎯 Distribución por objetivo</h2>
      <canvas id="objectiveChart" height="200"></canvas>
    </div>
  </div>

  <!-- Campaigns Table -->
  <div class="section">
    <h2>📋 Campañas</h2>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterCampaigns('ALL', this)">Todas</button>
      <button class="filter-btn" onclick="filterCampaigns('ACTIVE', this)">Activas</button>
      <button class="filter-btn" onclick="filterCampaigns('PAUSED', this)">Pausadas</button>
    </div>
    <div id="campaigns-table"><div id="loading"><div class="spinner"></div> Cargando campañas...</div></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const TOKEN = 'EAAhaEoAZAiZCQBQZBUpN9yuSbqpDDnJUU9gZClMHhJnQZBzfkxZC6tDsrWiMtdgH4370z02ltWfj7lrJ2bZB7s9p7KqaILy3pKK0rSf4bh8kMEz93dLGUqKOXR3FNaQ6nwjcZA7UrqyvB87d5sWRvKOayCgJS6rLFkm9u1ZAUuS1o4hcvcmbyKuCs3MMx80vbu4h54gZDZD';
const ACCOUNT = 'act_227998218377271';
const API = 'https://graph.facebook.com/v19.0';

let allCampaigns = [];
let insightsData = {};
let spendChart, objectiveChart;

function fmt(n) {
  if (!n) return '₡0';
  return '₡' + Number(n).toLocaleString('es-CR');
}
function fmtUSD(n) {
  if (!n) return '$0';
  return '$' + Number(n/600).toFixed(0);
}

async function fetchJSON(url) {
  const r = await fetch(url);
  return r.json();
}

async function loadData() {
  document.getElementById('conn-status').textContent = 'Actualizando...';
  document.getElementById('conn-status').style.color = '#ff9800';

  try {
    // Campaigns
    const campData = await fetchJSON(`${API}/${ACCOUNT}/campaigns?fields=name,status,daily_budget,lifetime_budget,objective&limit=50&access_token=${TOKEN}`);
    allCampaigns = campData.data || [];

    // Insights for active campaigns
    const activeCamps = allCampaigns.filter(c => c.status === 'ACTIVE');
    const insightPromises = activeCamps.map(c =>
      fetchJSON(`${API}/${c.id}/insights?fields=spend,impressions,clicks,ctr,actions&date_preset=last_30d&access_token=${TOKEN}`)
        .then(d => ({ id: c.id, data: d.data?.[0] || {} }))
    );
    const insightResults = await Promise.all(insightPromises);
    insightResults.forEach(r => { insightsData[r.id] = r.data; });

    // Account insights (totals)
    const totals = await fetchJSON(`${API}/${ACCOUNT}/insights?fields=spend,impressions,clicks,ctr&date_preset=last_30d&access_token=${TOKEN}`);
    const t = totals.data?.[0] || {};

    renderKPIs(t, activeCamps.length);
    renderTable(allCampaigns);
    renderCharts(activeCamps);

    document.getElementById('conn-status').textContent = '✓ Conectado — Adelante Desarrollos CDV';
    document.getElementById('conn-status').style.color = '#4caf50';
    document.getElementById('last-update').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-CR');

  } catch(e) {
    document.getElementById('conn-status').textContent = 'Error: ' + e.message;
    document.getElementById('conn-status').style.color = '#f44336';
  }
}

function renderKPIs(t, activeCount) {
  const ctr = t.ctr ? (parseFloat(t.ctr)).toFixed(2) + '%' : '—';
  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi-card blue">
      <div class="label">Campañas Activas</div>
      <div class="value">${activeCount}</div>
      <div class="sub">de ${allCampaigns.length} totales</div>
    </div>
    <div class="kpi-card green">
      <div class="label">Gasto (30 días)</div>
      <div class="value">${t.spend ? fmt(t.spend) : '—'}</div>
      <div class="sub">${t.spend ? fmtUSD(t.spend) + ' aprox.' : 'Sin datos'}</div>
    </div>
    <div class="kpi-card orange">
      <div class="label">Impresiones</div>
      <div class="value">${t.impressions ? Number(t.impressions).toLocaleString('es-CR') : '—'}</div>
      <div class="sub">Últimos 30 días</div>
    </div>
    <div class="kpi-card purple">
      <div class="label">Clics / CTR</div>
      <div class="value">${t.clicks ? Number(t.clicks).toLocaleString('es-CR') : '—'}</div>
      <div class="sub">CTR: ${ctr}</div>
    </div>
  `;
}

function renderTable(campaigns) {
  const filter = document.querySelector('.filter-btn.active')?.dataset?.filter || 'ALL';
  const filtered = filter === 'ALL' ? campaigns : campaigns.filter(c => c.status === filter);
  
  let html = `<table><thead><tr>
    <th>Campaña</th><th>Estado</th><th>Objetivo</th><th>Presupuesto</th><th>Gasto (30d)</th><th>Impresiones</th><th>Clics</th><th>CTR</th>
  </tr></thead><tbody>`;

  filtered.forEach(c => {
    const ins = insightsData[c.id] || {};
    const budget = c.daily_budget ? fmt(c.daily_budget) + '/día' : c.lifetime_budget ? fmt(c.lifetime_budget) + ' total' : '—';
    const obj = (c.objective || '').replace('OUTCOME_', '');
    const ctr = ins.ctr ? parseFloat(ins.ctr).toFixed(2) + '%' : '—';
    html += `<tr>
      <td style="max-width:280px;font-weight:500;">${c.name}</td>
      <td><span class="badge ${c.status.toLowerCase()}">${c.status === 'ACTIVE' ? '● Activa' : '⏸ Pausada'}</span></td>
      <td><span class="objective-chip">${obj}</span></td>
      <td>${budget}</td>
      <td>${ins.spend ? fmt(ins.spend) : '—'}</td>
      <td>${ins.impressions ? Number(ins.impressions).toLocaleString('es-CR') : '—'}</td>
      <td>${ins.clicks ? Number(ins.clicks).toLocaleString('es-CR') : '—'}</td>
      <td>${ctr}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('campaigns-table').innerHTML = html;
}

function filterCampaigns(status, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  btn.dataset.filter = status;
  renderTable(allCampaigns);
}

function renderCharts(activeCamps) {
  const spendLabels = [];
  const spendValues = [];
  activeCamps.forEach(c => {
    const ins = insightsData[c.id];
    if (ins?.spend) {
      spendLabels.push(c.name.replace('2025T', 'T').replace('2026T', 'T').substring(0, 25));
      spendValues.push(parseFloat(ins.spend));
    }
  });

  // Objective distribution
  const objCount = {};
  allCampaigns.forEach(c => {
    const o = (c.objective || 'OTHER').replace('OUTCOME_', '');
    objCount[o] = (objCount[o] || 0) + 1;
  });

  if (spendChart) spendChart.destroy();
  if (objectiveChart) objectiveChart.destroy();

  const chartDefaults = { color: '#ccc' };
  Chart.defaults.color = '#888';

  spendChart = new Chart(document.getElementById('spendChart'), {
    type: 'bar',
    data: {
      labels: spendLabels.length ? spendLabels : ['Sin datos'],
      datasets: [{
        label: 'Gasto ₡',
        data: spendValues.length ? spendValues : [0],
        backgroundColor: '#1877f2',
        borderRadius: 6,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#888', font: { size: 10 } }, grid: { color: '#2a2d3a' } },
        y: { ticks: { color: '#888', callback: v => '₡' + (v/1000).toFixed(0) + 'K' }, grid: { color: '#2a2d3a' } }
      }
    }
  });

  objectiveChart = new Chart(document.getElementById('objectiveChart'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(objCount),
      datasets: [{
        data: Object.values(objCount),
        backgroundColor: ['#1877f2','#4caf50','#ff9800','#9c27b0','#f44336'],
        borderWidth: 0,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { position: 'bottom', labels: { color: '#aaa', font: { size: 11 } } } }
    }
  });
}

// Auto-refresh every 5 minutes
loadData();
setInterval(loadData, 300000);
</script>
</body>
</html>
